<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Sahifasi</title>
    <style>
        /* Body styling */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Login container */

        .login-container {
            background: white;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 350px;
        }

        .login-container h2 {
            margin-bottom: 30px;
            color: #333;
        }

        /* Input fields */
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0 20px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px #667eea;
            outline: none;
        }

        /* Button styling */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        /* Label styling */
        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .login-container {
                width: 90%;
                padding: 30px 20px;
            }
        }
    </style>
    <script>
        function login() {
            var username = document.getElementById("username").value
            var password = document.getElementById("password").value
            if (username === "admin" && password === "jumaboyev") {
                window.location.href = "admin.html"
            } else if (username === "user" && password === "davronbek") {
                window.location.href = "user.html"
            } else {
                alert("Noto'g'ri foydalanuvchi nomi yoki parol!")
            }
        } 0
    </script>
</head>

<body>
    <div class="login-container">
        <h2>Login Sahifasi</h2>
        <label for="username">Foydalanuvchi nomi:</label>
        <input type="text" id="username" required>

        <label for="password">Parol:</label>
        <input type="password" id="password" required>

        <button onclick="login()">Kirish</button>
    </div>
</body>

</html>
