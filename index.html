<!DOCTYPE html>
<html lang="uz">

  <head>
    <meta charset="UTF-8">
    <title>Bo‘yoq tubiklari rang aralashtirgichi. Codepen tanlovi</title>
    <link rel="stylesheet" href="./style.css">
  </head>
    
  <body>
  <header>
	<div class="title"><em>Siqish</em> Lababaratoriyasi</div>
	<div class="subtitle">Bo‘yoq tubiklari rang aralashtirgichi</div>
	<div class="tag">✦ #cpc-rang-palitrasi · #codepentanlov ✦</div>
</header>

<section class="tubes-section" aria-label="Bo‘yoq tubiklari palitrasi">
	<div class="tubes-header">
		<div class="tubes-label">↓ Rang qo‘shish uchun tubikni siqing</div>
		<button class="shuffle-btn" onclick="shuffleTubes()" title="Yangi palitra tanlash">
			<span class="shuffle-icon">⇄</span> Yangi palitra
		</button>
	</div>
	<div class="tubes-rack" id="tubesRack" role="list"></div>
</section>

<section class="mix-zone" aria-label="Aralashtirish hududi">

	<div class="bowl-wrap">
		<div class="bowl-label">Aralashtirish kosasi</div>
		<div class="bowl-outer" id="bowlOuter" aria-label="Bo‘yoq aralashtirish maydoni">
			<canvas id="mixCanvas" width="260" height="260"></canvas>
			<div class="bowl-empty-msg" id="emptyMsg" aria-hidden="true">
				<div class="arrow">↑</div>
				<span>Yuqoridagi tubiklarni siqing</span>
			</div>
		</div>
		<button class="clear-bowl-btn" id="btnClear" onclick="clearBowl()" aria-label="Aralashtirish kosasini tozalash">
			<span class="icon">↺</span> Kosani tozalash
		</button>
	</div>

	<aside class="result-panel" aria-label="Aralash natija">

		<div class="result-swatch" id="resultSwatch" role="img" aria-label="Aralashtirilgan rang ko‘rinishi"></div>

		<div>
			<div class="result-hex-label">Aralashtirilgan rang</div>
			<div class="result-hex" id="resultHex" onclick="copyHex()" role="button" tabindex="0" aria-label="Hex qiymatini nusxalash uchun bosing" onkeydown="if(event.key==='Enter'||event.key===' ')copyHex()">#——</div>
		</div>

		<div class="colormix-snippet" aria-label="CSS color-mix formulasi">
			<div class="snippet-label">CSS color-mix()</div>
			<div class="snippet-code" id="snippetCode">
				<span style="color:var(--rule)">// formulani ko‘rish uchun tubiklarni siqing</span>
			</div>
		</div>

	</aside>
</section>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script  src="./script.js"></script>

  </body>
  
</html>
